<div class="grid mt-4 ">
    <div
        class="inventory-grid z-10 sticky top-0 grid gap-8 py-4 px-10 md:px-8 shadow text-md font-semibold text-secondary bg-gray-50 dark:bg-black dark:bg-opacity-5">
        <div>Event Title</div>
        <div>Event Id</div>
        <div>Type</div>
        <div>Creation Date</div>
        <div>Edit</div>
        <div>Submissions Dashboard</div>
        <div>Delete </div>
    </div>
    <div class="overflow-y-auto h-[calc(100vh_-_223px)] ">
        <div *ngFor="let event of allEvents"
            class="inventory-grid grid items-center text-secondary gap-8 py-3 px-10 md:px-8 border-b border-gray-400 ">

            <div [matTooltip]="event?.eventTitle" matTooltipPosition="above">
                {{event?.eventTitle}}</div>
            <div [matTooltip]="event?.docId" matTooltipPosition="above">
                {{event?.docId}}</div>
            <div [matTooltip]="" matTooltipPosition="above">
                {{event?.eventType}}</div>
            <div>
                {{event?.createdAt?(event?.createdAt?.seconds*1000| date: 'dd/MM/yyyy'):''}}</div>
            <div>
                <mat-icon (click)="onClickEdit(event)"
                    class="text-primary icon-size-5 cursor-pointer transition duration-500 transform  hover:scale-[115%]"
                    svgIcon="feather:edit"></mat-icon>
            </div>
            <div matTooltip="under developement">
                <button (click)="submissionDashboard(event)" mat-stroked-button class="bg-primary-500 text-white disabled:bg-primary-200">View</button>
            </div>
            <div>
                <mat-icon (click)="onDelete(event)"
                    class="text-red-500  cursor-pointer transition duration-500 transform  hover:scale-[115%]"
                    svgIcon="delete_outline"></mat-icon>
            </div>
        </div>
    </div>
</div>

<fuse-drawer class="w-screen min-w-screen z-999" [opened]="drawerOpened" fixed [mode]="'over'" [name]="'settingsDrawer'"
    [position]="'left'" #settingsDrawer>
    <div>
        <ng-container *ngComponentOutlet="component"></ng-container>
    </div>
</fuse-drawer>
