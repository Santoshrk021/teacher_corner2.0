<div class="flex justify-center ">
    <div class="w-full">
        <mat-stepper labelPosition="bottom" linear #stepper class=" bg-transparent" [animationDuration]="1000">
            <!-- <mat-step state="camera">
                <ng-template matStepLabel>Upload the image of completed activity</ng-template>
                <app-image-upload></app-image-upload>
            </mat-step>
            <mat-step state="pdf">
                <ng-template matStepLabel>Fill the observation sheet</ng-template>
                <app-obs-upload></app-obs-upload>
            </mat-step> -->

            <div *ngFor="let assignment of assignments?.assignments; let i=index">
                <mat-step *ngIf="assignment?.uploadFileType=='IMAGE' || assignment?.uploadFileType=='image'"
                    [completed]="uploadStates[i]">
                    <ng-template matStepLabel>{{assignment?.title}}</ng-template>
                    <app-image-upload [isLastStep]="isLastStep" [rawWorkflowInfo]="rawWorkflowInfo"
                        [assignmentData]="assignment" [asgnId]="assignments.docId" [workflowId]="workflowId"
                        [currentWorkflow]="currentWorkflow" [selectedStageSubmInfo]="selectedStageSubmInfo"
                        [isOldcontest]="isOldContest" [contestInfo]="contestInfo" [current]="i+1"
                        [total]="assignments?.assignments.length"
                        (isAttemptedEvent)="catchIsAttemptedEvent($event, i)"></app-image-upload>
                </mat-step>
                <mat-step *ngIf="assignment?.uploadFileType=='VIDEO' || assignment?.uploadFileType=='video'"
                    [completed]="uploadStates[i]">
                    <ng-template matStepLabel>{{assignment?.title}}</ng-template>
                    <app-video-upload [isLastStep]="isLastStep" [rawWorkflowInfo]="rawWorkflowInfo"
                        [assignmentData]="assignment" [asgnId]="assignments.docId" [workflowId]="workflowId"
                        [currentWorkflow]="currentWorkflow" [selectedStageSubmInfo]="selectedStageSubmInfo"
                        [isOldcontest]="isOldContest" [contestInfo]="contestInfo" [current]="i+1"
                        [total]="assignments?.assignments.length"
                        (isAttemptedEvent)="catchIsAttemptedEvent($event, i)"></app-video-upload>
                </mat-step>

                <mat-step *ngIf="assignment?.uploadFileType=='PDF' || assignment?.uploadFileType=='pdf'"
                    [completed]="uploadStates[i]">
                    <ng-template matStepLabel>{{assignment?.title}}</ng-template>
                    <app-obs-upload [isLastStep]="isLastStep" [rawWorkflowInfo]="rawWorkflowInfo"
                        [assignmentData]="assignment" [asgnId]="assignments.docId" [workflowId]="workflowId"
                        [currentWorkflow]="currentWorkflow" [selectedStageSubmInfo]="selectedStageSubmInfo"
                        [isOldcontest]="isOldContest" [contestInfo]="contestInfo" [current]="i+1"
                        [total]="assignments?.assignments.length"
                        (isAttemptedEvent)="catchIsAttemptedEvent($event, i)"></app-obs-upload>
                </mat-step>
                <!-- <mat-step *ngIf="assignment?.uploadFileType=='url'">
                                <ng-template matStepLabel>Join the live session</ng-template>
                                <app-live-session [assignmentData]='assignment'></app-live-session>
                            </mat-step> -->
            </div>


            <!-- Icon overrides. -->
            <ng-template matStepperIcon="camera">
                <mat-icon> perm_media</mat-icon>
            </ng-template>
            <ng-template matStepperIcon="pdf">
                <mat-icon>receipt</mat-icon>
            </ng-template>

        </mat-stepper>


    </div>
</div>
