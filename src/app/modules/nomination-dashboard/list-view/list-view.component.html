<div class="grid ">
    <!-- Header -->
    <div class="inventory-grid z-10 sticky top-0 grid gap-8 py-4 px-10 md:px-8 shadow text-md font-semibold text-secondary bg-gray-50 dark:bg-black dark:bg-opacity-5"
        matSort matSortDisableClear>
        <div> </div>
        <div class="">
            Grade
        </div>
        <div>Nominated</div>
        <div></div>
        <div></div>
    </div>
    <!-- Rows -->
    <ng-container *ngFor="let g of gradeList; trackBy: trackByFn">
        <div
            class="inventory-grid grid items-center text-secondary gap-8 py-3 px-10 md:px-8 border-b border-gray-300 overflow-x-auto">

            <div class="w-16 h-16">
                <img src="../../../assets/grade-icons/Raman Awards - Grade {{g}}.png" alt="Learing unit image icon"
                    class="w-16">
            </div>

            <div >Grade {{g}}</div>
            <div > {{nominatedObj[g]}}/{{stageInfo?.maximumNomination}}</div>
            <div [matTooltip]="nominatedObj[g]==stageInfo?.maximumNomination?'You Have Reached Maximum Nominations':''">
                <button [disabled]="nominatedObj[g]==stageInfo?.maximumNomination" mat-stroked-button (click)="addNomination(g)" class="my-2">
                    <span class="inline-flex items-center">
                        <span>Add Nomination</span>
                        <mat-icon class="ml-1.5 icon-size-5" [svgIcon]="'heroicons_solid:arrow-sm-right'"></mat-icon>
                    </span>
                </button>
            </div>
            <div  matTooltipPosition="above" [matTooltip]="nominatedObj[g]==0?'You Dont Have Any Nomination':''">
                <button [disabled]="!nominatedObj[g]"  (click)="viewNomination(g)" mat-stroked-button class="my-2">
                    <span class="inline-flex items-center">
                        <span>View Nomination</span>
                        <mat-icon class="ml-1.5 icon-size-5" [svgIcon]="'heroicons_solid:arrow-sm-right'"></mat-icon>
                    </span>
                </button>
            </div>
        </div>

    </ng-container>

</div>
