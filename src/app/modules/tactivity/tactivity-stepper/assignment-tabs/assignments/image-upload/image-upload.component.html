<div class="mr-6">
    <!-- <h2 class="text-2xl sm:text-2xl text-accent text-center mb-4">Upload the image of completed activity</h2> -->
    <table>
        <tr>
            <th class="w-1/3 pb-4 text-primary">Due Date</th>
            <td class="pb-4 text-secondary">{{assignmentData?.DueDate._seconds*1000 | date}}</td>
        </tr>
        <tr>
            <th class="w-1/3 pb-4 text-primary">Instructions</th>
            <td class="pb-4 text-secondary"> {{assignmentData?.Instructions}}
            </td>
        </tr>
        <tr>
            <th class="w-1/3 text-primary">Assignment</th>
            <td class="">
                <div class="flex items-center ">

                    <div class="flex flex-col sm:flex-row  sm:items-center  bg-grey-lighter">
                        <label matRipple
                            class="max-w-36 flex flex-col items-center scale-90 mat-flat-button bg-primary text-white hover:bg-primary-700">
                            <div class="flex items-center m-2">
                                <span *ngIf="bytesTransferred==100" class="m-1">
                                    <mat-icon svgIcon="heroicons_outline:check"></mat-icon>
                                </span>
                                <span *ngIf="!filename" class="mr-1">
                                    <mat-icon svgIcon="heroicons_outline:plus"></mat-icon>
                                </span>
                                <span class=" mr-2 text-base"> {{bytesTransferred==100?'Uploaded' : 'Upload'}}</span>
                            </div>
                            <input type='file' class="hidden" accept=".jpg,.png" #elementRef
                                (change)="upload($event)" />
                        </label>
                        <span class="text-xs text-secondary line-clamp-1 ml-1">{{filename}} </span>
                    </div>
                    <div class="pl-2 mb-4 sm:hidden" [style.visibility]=" loader ? 'visible' : 'hidden'">
                        <span class="loader ml-6"></span>
                    </div>
                    <div class="hidden sm:block">
                        <button matRipple
                            class="ml-2 mat-stroked-button hover:bg-primary hover:text-white active:bg-primary-800 scale-90"
                            (click)="onClickView()">View</button>
                    </div>
                </div>
            </td>
        </tr>
        <tr>
            <th></th>
            <td class="block sm:hidden pt-3"><button matRipple
                    class="ml-2 mat-stroked-button hover:bg-primary border-primary hover:text-white "
                    (click)="onClickView()">View</button>
            </td>
        </tr>
        <tr>
            <th></th>
            <div class="pl-2 mt-2 hidden sm:block" [style.visibility]=" loader ? 'visible' : 'hidden'">
                <span class="loader ml-12"></span>
            </div>
        </tr>
    </table>

   
    <!-- <div class="mt-4" *ngIf="bytesTransferred>0">
        <mat-progress-bar class="flex-0 h-1 w-full m-3 pt-0" [value]="bytesTransferred">
        </mat-progress-bar>
    </div> -->

</div>
