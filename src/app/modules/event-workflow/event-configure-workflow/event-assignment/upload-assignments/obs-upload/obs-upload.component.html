<div>
    <!-- <h2 class="text-2xl sm:text-2xl text-accent mt-0 text-center">Fill the observation sheet</h2> -->
    <table>
        <tr>
            <th class="w-1/3 pb-4 text-primary">Due Date</th>
            <!-- <td class="pb-4 text-secondary">{{assignmentData?.assignmentDueDate?._seconds * 1000 | date}}</td> -->
            <td class="pb-4 text-secondary">{{assignmentData?.dueDate?.seconds*1000 | date}}</td>
        </tr>
        <tr>
            <th class="w-1/3 pb-4 text-primary">Instructions</th>
            <td class="pb-4 text-secondary text-sm">{{isDescription}}
                <span *ngIf="isContainsLink.length">
                    <a [href]="isContainsLink[0]" target="_blank"><u class="text-blue-600">{{isContainsLink[0]}}</u>
                    </a>
                </span>

                <!-- <a href="http://" target="_blank" rel="noopener noreferrer"></a> -->
            </td>
        </tr>
        <tr *ngIf="!privilege">
            <th class="w-1/3 text-primary">Assignment</th>
            <td class="">
                <div class="flex  sm:items-center">

                    <div *ngIf="!isFinalSubmission" class="flex flex-col sm:flex-row  sm:items-center  bg-grey-lighter">
                        <label
                            class="max-w-36 flex flex-col items-center scale-90 mat-flat-button bg-primary active:bg-primary-400 text-white hover:bg-primary-700">
                            <div class="flex items-center m-2">
                                <span *ngIf="bytesTransferred==100" class="m-1">
                                    <mat-icon svgIcon="heroicons_outline:check"></mat-icon>
                                </span>
                                <span *ngIf="!filename" class="mr-1">
                                    <mat-icon svgIcon="heroicons_outline:plus"></mat-icon>
                                </span>
                                <!-- <span class=" mr-2 text-base"> {{bytesTransferred==100?'Uploaded' : 'Upload'}}</span> -->
                                <span class=" mr-2 text-base"> {{storedFilePath?'Re-upload' : 'Upload'}}</span>
                            </div>
                            <input type='file' class="hidden" accept=".pdf" (change)="upload($event)" #elementRef />
                        </label>
                        <!-- <span class="text-xs text-secondary line-clamp-1 ml-1"> {{filename?.substring(0,5)}} ... </span> -->
                    </div>
                    <div class=" mt-3 sm:hidden" [style.visibility]=" loader ? 'visible' : 'hidden'">
                        <span class="loader "></span>
                    </div>
                    <div class="hidden sm:block">
                        <!-- <button matRipple
                            class="ml-2 mat-stroked-button hover:bg-primary hover:text-white active:bg-primary-800 scale-90"
                            (click)="onClickView()">View</button> -->

                        <a *ngIf="storedFilePath" matRipple [href]="storedFilePath|getDownloadURL" target="_blank"
                            class="ml-2 mat-stroked-button hover:bg-primary hover:text-white active:bg-primary-800 scale-90"
                            title="View">View</a>


                    </div>
                </div>
            </td>
        </tr>
        <tr *ngIf="!privilege">
            <th></th>
            <td class="block sm:hidden pt-3">
                <!-- <button matRipple
                    class="ml-2 mat-stroked-button hover:bg-primary border-primary hover:text-white "
                    (click)="onClickView()">View</button> -->

                <a *ngIf="storedFilePath" matRipple [href]="storedFilePath|getDownloadURL" target="_blank"
                    class="ml-2 mat-stroked-button hover:bg-primary hover:text-white active:bg-primary-800 scale-90"
                    title="View">View</a>
            </td>
        </tr>
        <tr>
            <th></th>
            <div class="pl-2 mt-2 hidden sm:block" [style.visibility]=" loader ? 'visible' : 'hidden'">
                <span class="loader ml-12"></span>
            </div>
        </tr>
    </table>
    <!-- <mat-progress-bar class="flex-0 h-1 w-full hidden m-3" [value]="60">
    </mat-progress-bar> -->
</div>
