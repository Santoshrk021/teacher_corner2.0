<form [formGroup]="assignmentsFormGroup">
    <div class="h-[62vh] grid grid-cols-12">
        <div class="px-2 pt-1 h-full overflow-y-auto scroll-mr-100 col-span-10 bg-slate-50 rounded-xl border">
            <mat-form-field class="w-full text-accent-600">
                <mat-label class="font-semibold text-primary">Instructions</mat-label>
                <input matInput formControlName="instructions" type="text"
                    placeholder="Enter the instructions for this assignment">

                <!-- [formRelatedDetails]="{formGroupName: assignmentsFormGroup.get('questions').at(i), formControlName: 'instructions', index: i}" -->
                <!-- <app-standard-quill-text-input-field
                    [formRelatedDetails]="{formGroupName: assignmentsFormGroup, formControlName: 'instructions'}"
                    [placeHolder]="'Enter instructions for this assignment'"
                    [toolbarProperties]="[['bold', 'italic', 'underline', 'strike'], ['clean']]"></app-standard-quill-text-input-field> -->
            </mat-form-field>

            <!-- display the instructions -->
            <div class="text-primary-500 mb-1 font-semibold">Preview</div>
            <div class="bg-white rounded-xl border border-slate-300 p-2">
                <div *ngIf="assignmentsFormGroup?.get('instructions')?.value?.includes('<'); else textOnly"
                    [innerHTML]="assignmentsFormGroup.get('instructions').value"></div>
                <ng-template #textOnly>{{assignmentsFormGroup.get('instructions').value}}</ng-template>
            </div>

            <!--
            <div formArrayName="questions">
                <div *ngFor="let question of questions?.controls; let i=index" [formGroupName]="i">
                    <div class="grid grid-cols-12 gap-2 items-center">
                        <div class="col-span-11">
                            <mat-form-field class="w-full text-accent-600">
                                <mat-label class="font-semibold text-primary">Question {{i + 1}}</mat-label>
                                <input matInput formControlName="question" type="text"
                                    [placeholder]="'Enter the question number '+(i+1)">
                            </mat-form-field>
                        </div>

                        <div class="col-span-1">
                            <button (click)="removeQuestion(i)">
                                <mat-icon
                                    class="text-red-500 icon-size-8 cursor-pointer duration-500 hover:scale-[115%]"
                                    svgIcon="delete_outline"></mat-icon>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            -->

            <!--
            <div class="col-span-1 justify-center">
                <button class="mt-2" (click)="addField()">
                    <mat-icon matTooltip="Add new textblock"
                        class="ml-4 icon-size-8 text-primary-600 cursor-pointer plusIcon active:text-primary-500"
                        [svgIcon]="'heroicons_solid:plus-circle'">
                    </mat-icon>
                </button>
            </div>
            -->
        </div>
    </div>
</form>

<div class="flex flex-row-reverse pt-3">
    <button matStepperNext mat-stroked-button type="button" (click)="onClickNext()"
        [disabled]="!assignmentsFormGroup.valid" class="bg-primary text-white arrowBtn disabled:bg-primary-100"
        [matTooltip]="tooltipMessage">
        Next
        <mat-icon *ngIf="assignmentsFormGroup.valid" class="ml-2 icon-size-5 text-white arrowIcon"
            [svgIcon]="'heroicons_solid:arrow-sm-right'"></mat-icon>
        <mat-icon *ngIf="!assignmentsFormGroup.valid" class="ml-2 icon-size-5 text-white "
            [svgIcon]="'heroicons_solid:arrow-sm-right'"></mat-icon>
    </button>
</div>
