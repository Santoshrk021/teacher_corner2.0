<div class="flex flex-col w-full bg-white ">
    <div class="flex items-center justify-between bg-gray-100 p-2">
        <!--  Title -->
        <div class="text-3xl font-bold">Kit Manager</div>


        <!-- Buttons -->
        <div class="flex gap-2 justify-end font-semibold pt-2">
            <div>
            <button [matMenuTriggerFor]="menu" matTooltipPosition="above" matTooltip="Create a KIT"
                mat-stroked-button class="quizCreateBtn text-primary bg-gray-50">
                Create a Kit
                <mat-icon class="ml-4 icon-size-8 text-primary-600 cursor-pointer plusIcon active:text-primary-500"
                    [svgIcon]="'heroicons_solid:plus-circle'">
                </mat-icon>
            </button>

            <mat-menu #menu="matMenu" xPosition="before">
                <button mat-menu-item (click)="addDialog()">
                    <mat-icon class="text-primary-700" svgIcon="mat_outline:upload_file"></mat-icon>
                    <span class="text-primary-700 font-medium">Create Batch</span>
                </button>
                <button mat-menu-item (click)="addBatchDialog()">
                    <mat-icon class="text-primary-700" svgIcon="heroicons_outline:device-phone-mobile"></mat-icon>
                    <span class="text-primary-700 font-medium">Clicker</span>
                </button>
            </mat-menu>
        </div>
            <button class="flex items-center gap-2 bg-primary-500 text-white px-4 py-2 rounded-full shadow-md"
                (click)="trashDialog()">
                <mat-icon svgIcon="heroicons_outline:trash" aria-hidden="false" class="text-white scale-110">
                </mat-icon>Trash
            </button>
        </div>
    </div>

    <!-- List -->
    <div class="flex flex-col w-full  justify-start ">
        <app-kit-list></app-kit-list>
    </div>
</div>


<fuse-drawer *ngIf="show" class="w-screen min-w-screen" [opened]="drawerOpened" fixed [mode]="'over'"
    [position]="'left'">
    <div>
        <ng-container *ngComponentOutlet="component"></ng-container>
    </div>
</fuse-drawer>
