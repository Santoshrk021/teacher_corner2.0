<div class="mx-auto p-4 relative">
    <div class="absolute -top-4 -right-2">
        <button mat-dialog-close class="">
            <mat-icon class="hover:scale-110 transition duration-5000 transform" svgIcon="mat_outline:close">
            </mat-icon>
        </button>
    </div>

    <form [formGroup]="ratingForm" (ngSubmit)="onSubmit()">
        <table class="table-auto w-full border border-gray-300">
            <!-- <thead class="bg-gray-200"> -->
            <thead class="bg-[#282B66] text-white">
                <!-- <thead class="bg-primary-600 text-white"> -->
                <tr>
                    <th class="border px-4 py-2 text-left">Ratings</th>
                    <th class="border px-4 py-2 text-left" *ngFor="let count of optionCount">
                        {{count}}
                    </th>
                </tr>
            </thead>
            <tbody>
                <ng-container *ngFor="let evaluation of evaluationData">
                    <tr>
                        <td class="border px-4 py-2 align-top">
                            <span>{{evaluation.description}}</span>
                        </td>

                        <td class="border px-4 py-2" *ngFor="let option of evaluation.options; let i = index">
                            <div class="flex flex-col gap-2">
                                <label class="inline-flex items-center">
                                    <input type="radio" [formControlName]="evaluation.rubrique" [value]="option"
                                        class="h-5" />
                                    <span class="ml-2">{{option}}</span>
                                </label>
                            </div>
                        </td>
                    </tr>
                </ng-container>
            </tbody>
        </table>

        <div class="my-3">
            <mat-form-field class="w-full text-accent-600" floatLabel="always">
                <mat-label class="text-[#282B66]">Additional Feedback</mat-label>
                <input matInput formControlName="additionalFeedback" type="text"
                    placeholder="Enter any additional feedback here" />
            </mat-form-field>
        </div>

        <!-- Submit Button -->
        <div class="my-3 text-center">
            <button type="submit" mat-raised-button color="primary" [disabled]="ratingForm.invalid || isRatingSubmitted"
                class="fuse-mat-stroked-button-large my-3 cursor-pointer">
                Submit
            </button>
        </div>
    </form>
</div>
