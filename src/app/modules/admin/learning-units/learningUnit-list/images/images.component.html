<div class="grid grid-cols-2 sm:grid-cols-2  sm:h-64 -mt-4 ">
    <div class="sm:border-r  border-primary-300">
        <mat-label class="text-accent-600 text-sm font-medium relative right-2">Head line Image</mat-label>
        <div class="grid grid-cols-2 gap-27">
            <div class="flex flex-col bg-grey-lighter" [title]="trashUINotEditable?matTooltipMsg:''">
                <label matRipple class=" border border-primary relative w-full right-2
                     flex flex-col items-center  rounded-lg p-2  cursor-pointer
                      rounded-r-none bg-slate-100 text-primary-600 box-border"
                    [ngClass]="trashUINotEditable?'':' hover:bg-slate-200'">
                    <span class=" md:mx-2 absolute left-0 sm:mr-2 mt-[-2px]">
                        <mat-icon class="text-primary" svgIcon="heroicons_outline:arrow-circle-down"></mat-icon>
                    </span>
                    <div class="flex items-center">
                        <span class=" md:mr-2 md:text-base relative sm:text-[10px] sm:ml-6">
                            {{ luDetails?.learningUnitImage ? 'Re-upload' : 'Upload' }}
                        </span>
                    </div>
                    <input [disabled]="trashUINotEditable === true ? true : false" type='file' class="hidden"
                        accept=".png,.jpeg,.jpg,.svg,.webp" (change)="selectFile($event,'learningUnitImage')"
                        #elementRef />
                </label>
            </div>

            <div class="">
                <div *ngIf="luDetails?.learningUnitImage?.length" matRipple class="w-3/5 md:ml-1 sm:mr-1 p-2 border border-primary-600 rounded-lg rounded-l-none
                    bg-primary-600 hover:bg-primary text-white
                    active:bg-primary-800 cursor-pointer relative md:left-1 sm:left-0 md:text-base sm:text-[10px]">
                    <a target="_blank" [href]="luDetails?.learningUnitImage | getDownloadURL"
                        class="w-full h-full flex items-center justify-center">
                        <p>View</p>
                    </a>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <mat-label class=" text-accent-600 text-sm font-medium relative right-2">Other Image</mat-label>

            <div class="grid grid-cols-2 gap-27">
                <div class="flex flex-col bg-grey-lighter" [title]="trashUINotEditable?matTooltipMsg:''">
                    <label matRipple class=" border border-primary relative w-full right-2
                     flex flex-col items-center  rounded-lg p-2  cursor-pointer
                      rounded-r-none bg-slate-100 text-primary-600  box-border"
                        [ngClass]="trashUINotEditable?'':' hover:bg-slate-200'">
                        <span class=" md:mx-2 absolute left-0 sm:mr-2 mt-[-2px] ">
                            <mat-icon class="text-primary" svgIcon="heroicons_outline:arrow-circle-down"></mat-icon>
                        </span>
                        <div class="flex items-center">
                            <span class=" md:mr-2 md:text-base relative sm:text-[10px] sm:ml-6">
                                {{ luDetails?.resources?.otherImagePath ? 'Re-upload' : 'Upload' }}
                            </span>
                        </div>
                        <input [disabled]="trashUINotEditable === true ? true : false" type='file' class="hidden"
                            accept=".png,.jpeg" (change)="selectFile($event,'otherImagePath')" #elementRef />
                    </label>
                </div>

                <div class="">
                    <div *ngIf="luDetails?.resources?.otherImagePath?.length" matRipple class="w-3/5 md:ml-1 sm:mr-1 p-2 border border-primary-600 rounded-lg rounded-l-none
                    bg-primary-600 hover:bg-primary text-white
                    active:bg-primary-800 cursor-pointer relative md:left-1 sm:left-0 md:text-base sm:text-[10px]">
                        <a target="_blank" [href]="luDetails?.resources?.otherImagePath | getDownloadURL"
                            class="w-full h-full flex items-center justify-center">
                            <p>View</p>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class=" border-primary-300 ml-14">
        <mat-label class="text-accent-600 text-sm font-medium relative right-2">QRCode Image</mat-label>
        <div class="grid grid-cols-2 gap-27">
            <div class="flex flex-col bg-grey-lighter" [title]="trashUINotEditable ? matTooltipMsg : ''">
                <label matRipple class=" border border-primary relative w-full right-2
                     flex flex-col items-center  rounded-lg p-2  cursor-pointer
                      rounded-r-none bg-slate-100 text-primary-600 box-border"
                    [ngClass]="trashUINotEditable ? '' : 'hover:bg-slate-200'">
                    <span class=" md:mx-2 absolute left-0 sm:mr-2 mt-[-2px] ">
                        <mat-icon class="text-primary" svgIcon="heroicons_outline:arrow-circle-down"></mat-icon>
                    </span>
                    <div class="flex items-center">
                        <span class=" md:mr-2 md:text-base relative sm:text-[10px] sm:ml-6">
                            {{ luDetails?.resources?.qrCodeImagePath ? 'Re-upload' : 'Upload' }}
                        </span>
                    </div>
                    <input [disabled]="trashUINotEditable === true ? true : false" type='file' class="hidden"
                        accept=".png,.jpeg" (change)="selectFile($event,'qrCodeImagePath')" #elementRef />
                </label>
            </div>

            <div class="">
                <div [title]="trashUINotEditable ? matTooltipMsg : ''"
                    *ngIf="luDetails?.resources?.qrCodeImagePath?.length" matRipple class="w-3/5 md:ml-1 sm:mr-1 p-2 border border-primary-600 rounded-lg rounded-l-none
                    bg-primary-600 hover:bg-primary text-white active:bg-primary-800 cursor-pointer relative
                    md:left-1 sm:left-0 md:text-base sm:text-[10px]">
                    <a target="_blank" [href]="luDetails?.resources?.qrCodeImagePath | getDownloadURL"
                        class="w-full h-full flex items-center justify-center">
                        <p>View</p>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
