<div class="flex flex-col w-full">
    <div class="flex items-center justify-between px-6 py-4 border-b">
        <div class="text-lg font-semibold text-slate-800">Reassign Remote</div>
        <button mat-icon-button (click)="close()">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <div class="px-6 py-5">
        <div class="text-sm text-slate-600" *ngIf="data.target.kind === 'teacher'">
            Choose a new remote for the teacher.
        </div>
        <div class="text-sm text-slate-600" *ngIf="data.target.kind === 'student'">
            Choose a new remote for <span class="font-medium">{{ data.target.accessCode }}</span>.
        </div>

        <div class="mt-4" *ngIf="loading">
            <div class="flex items-center gap-3 text-sm text-slate-600">
                <mat-spinner diameter="18"></mat-spinner>
                <span>Loading kit remotes...</span>
            </div>
        </div>

        <div class="mt-4" *ngIf="!loading">
            <div class="text-xs text-slate-500">
                Current MAC: {{ data.target.currentMac }}
            </div>

            <div class="mt-3" *ngIf="availableRemotes.length === 0">
                <div class="text-sm text-slate-700">No unused remotes available.</div>
            </div>

            <mat-radio-group class="flex flex-col gap-2" [(ngModel)]="selectedMac" *ngIf="availableRemotes.length > 0">
                <mat-radio-button *ngFor="let r of availableRemotes" [value]="r.mac">
                    <span class="text-sm text-slate-800">Slot {{ r.slotNumber }} - {{ r.mac }}</span>
                    <span class="text-xs text-slate-500 ml-2">({{ r.role }})</span>
                </mat-radio-button>
            </mat-radio-group>
        </div>
    </div>

    <div class="flex flex-col w-full mt-auto">
        <div class="relative h-0.5">
            <div class="h-0.5 bg-primary-100 w-full"></div>
        </div>
        <div class="px-6 py-4 text-right bg-gray-50 dark:bg-transparent flex items-center justify-between">
            <button mat-stroked-button (click)="close()">Cancel</button>
            <button mat-raised-button color="primary" (click)="save()" [disabled]="!canSave()">
                Save
            </button>
        </div>
    </div>
</div>
