<div class="flex flex-wrap md:flex-nowrap gap-6 w-full">
    <div class="w-full md:w-1/2">
        <div class="w-full">
            <div class="w-full flex items-center justify-between">
                <h2 class="text-lg font-bold mb-2">Available Remotes</h2>
                <button
                    mat-dialog-close
                    (click)="close()"
                    class="flex items-center -mt-8 -mr-4"
                >
                    <mat-icon
                        class="hover:scale-110 transition duration-5000 transform"
                        svgIcon="mat_outline:close"
                    ></mat-icon>
                </button>
            </div>

            <div *ngIf="remotes.length > 0" class="mt-4">
                <div
                    *ngFor="let remote of remotes; let i = index"
                    class="flex items-center gap-2 mt-2"
                >
                    <input
                        [(ngModel)]="remote.name"
                        class="border px-2 py-1 rounded flex-1"
                    />
                    <span class="text-sm text-gray-500"
                        >MAC ID: {{ remote.mac }}</span
                    >
                    <button mat-icon-button (click)="removeRemote(remote.mac)">
                        <mat-icon color="warn">delete</mat-icon>
                    </button>
                </div>
            </div>

            <div class="mt-6 text-center">
                <button
                    mat-raised-button
                    color="primary"
                    (click)="addRemoteDetailsToDB()"
                    [disabled]="remotes.length === 0"
                >
                    Continue
                </button>
            </div>
        </div>
    </div>

    <!-- Right card for batch boxes -->
    <div class="w-full md:w-1/2">
        <div
            class="p-4 rounded-lg shadow-lg border border-gray-300 bg-white h-full"
        >
            <div class="flex items-center gap-4 mb-4">
                <label class="text-sm font-medium text-gray-700"
                    >Enter batch number:</label
                >
                <input
                    type="number"
                    min="1"
                    [(ngModel)]="batchNumber"
                    class="border px-2 py-1 rounded w-24"
                />
                <button
                    class="bg-primary-600 hover:bg-blue-700 text-white px-4 py-1 rounded shadow"
                    (click)="generateBoxes()"
                    [disabled]="!batchNumber || batchNumber <= 0"
                >
                    Create Boxes
                </button>
            </div>

            <div
                *ngIf="numberBoxes.length > 0"
                class="grid grid-cols-4 gap-4 mt-4"
            >
                <div
                    *ngFor="let num of numberBoxes; let i = index"
                    [ngClass]="{
                        'bg-red-500 text-white': i < registeredCount,
                        'bg-primary-200 text-white': i >= registeredCount
                    }"
                    class="w-10 h-10 flex items-center justify-center font-bold rounded-lg shadow text-xl transition duration-300 ease-in-out"
                >
                    {{ num }}
                </div>
            </div>
        </div>
    </div>
</div>
