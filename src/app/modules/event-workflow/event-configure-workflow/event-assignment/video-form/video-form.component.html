<div class="flex flex-col flex-auto min-w-0">
    <div class="flex-auto p-6 sm:p-10">
        <div class="max-w-3xl">
            <form [formGroup]="videoForm" class="flex flex-col px-8 py-10 bg-card shadow rounded overflow-hidden">
                <p class="text-lg font-medium">Innovation Video</p>
                <!-- <p class="text-secondary mb-6">
                    These include: Name of Innovation; Subject/Topic/Subtopic; Materials Used; Description etc
                </p> -->
                <div class="flex flex-col">
                    <mat-form-field class="flex-auto">
                        <input formControlName="videoLink" matInput [placeholder]="'Innovation Video Link '">
                        <mat-icon class="icon-size-5" matPrefix svgIcon="subject"></mat-icon>
                    </mat-form-field>

                    <button (click)="onSave()" [disabled]="!isActive" type="button"  mat-flat-button [color]="'primary'">
                        Save
                    </button>
                </div>
               
            </form>
        </div>
    </div>
</div>
