<form [formGroup]="assignmentsFormGroup">
    <div class=" h-[62vh]  grid grid-cols-12 ">
        <div formArrayName="assignments"
            class="px-2 pt-1 h-full overflow-y-auto scroll-mr-100 col-span-11 bg-slate-50  rounded-xl border">
            <mat-stepper labelPosition="bottom" linear #stepper class=" bg-transparent" [animationDuration]="1000"
                (selectionChange)="onChange($event)">
                <mat-step *ngFor="let question of assignments?.controls; let i=index" [formGroupName]="i">
                    <ng-template matStepLabel>
                        {{question?.value?.title}}
                    </ng-template>
                    <ng-template matStepContent>
                        <div class="mt-1 font-bold ">
                            <div class="grid grid-cols-12  items-center">
                                <div class="col-span-2 text-primary ">Title</div>
                                <div class="col-span-8">
                                    <mat-form-field class="w-full text-accent-600">
                                        <input matInput type="text" formControlName="title">
                                    </mat-form-field>
                                </div>
                            </div>

                            <div class="grid grid-cols-12  items-center">
                                <div class="col-span-2 text-primary ">Upload File Type</div>
                                <div class="col-span-8">
                                    <mat-form-field class="w-full text-accent-600 ">
                                        <mat-select formControlName="uploadFileType"
                                            placeholder="Select Upload File Type">
                                            <mat-option disabled selected>Select</mat-option>
                                            <!-- <mat-option value="PDF">PDF</mat-option>
                                            <mat-option value="IMAGE">Image</mat-option>
                                            <mat-option value="VIDEO">Video</mat-option>
                                            <mat-option value="WORD">Word Document</mat-option>
                                            <mat-option value="EXCEL">Spreadsheet</mat-option>
                                            <mat-option value="PPT">Powerpoint Presentation</mat-option> -->
                                            <mat-option *ngFor="let assignmentType of assignmentTypes|keyvalue"
                                                [value]="assignmentType?.key">
                                                {{assignmentType?.value}}
                                            </mat-option>
                                        </mat-select>
                                    </mat-form-field>
                                </div>
                            </div>

                            <div class="grid grid-cols-12  items-center">
                                <div class="col-span-2 text-primary ">Instructions</div>
                                <div class="col-span-8">
                                    <!-- <mat-form-field class="w-full text-accent-600">
                                    <textarea formControlName="instructions" class="title" id="title" matInput type="text"
                                            placeholder="Enter instructions for this assignment"></textarea>
                                    </mat-form-field> -->
                                    <app-standard-quill-text-input-field
                                        [formRelatedDetails]="{formGroupName: assignmentsFormGroup.get('assignments').at(i), formControlName: 'instructions', index: i}"
                                        [placeHolder]="'Enter instructions for this assignment'"
                                        [toolbarProperties]="[['bold', 'italic', 'underline', 'strike'], ['clean']]"></app-standard-quill-text-input-field>
                                </div>
                            </div>

                            <div class="grid grid-cols-12 items-center ">
                                <span class="font-semibold text-primary col-span-2">Duration</span>

                                <div class="col-span-8">
                                    <div class="grid grid-cols-3 gap-7 items-center">
                                        <mat-form-field class="w-full text-accent-600">
                                            <mat-label class="font-semibold text-primary">Hours</mat-label>
                                            <input [min]="0" [max]="23" matInput formControlName="durationInHours"
                                                type="number" placeholder="Enter hours"
                                                (input)="timeValidation('durationInHours', i)">
                                        </mat-form-field>

                                        <mat-form-field class="w-full text-accent-600">
                                            <mat-label class="font-semibold text-primary">Minutes</mat-label>
                                            <input [min]="0" [max]="59" matInput formControlName="durationInMinutes"
                                                type="number" placeholder="Enter minutes"
                                                (input)="timeValidation('durationInMinutes', i)">
                                        </mat-form-field>

                                        <mat-form-field class="w-full text-accent-600">
                                            <mat-label class="font-semibold text-primary">Seconds</mat-label>
                                            <input [min]="0" [max]="59" matInput formControlName="durationInSeconds"
                                                type="number" placeholder="Enter seconds"
                                                (input)="timeValidation('durationInSeconds', i)">
                                        </mat-form-field>
                                        
                                    </div>
                                </div>
                            </div>

                            <!-- <div class="grid grid-cols-12 items-center">
                                <div class="col-span-2 text-primary ">Due Date</div>
                                <div class="col-span-8">
                                    <mat-form-field class="w-full text-accent-600">
                                        <input id="date" formControlName="assignmentDueDate" matInput type="date"
                                            placeholder="Enter Due date">
                                    </mat-form-field>
                                </div>
                            </div> -->

                            <div class="grid grid-cols-12  items-center">
                                <div class="col-span-2 text-primary ">Max Size in mb</div>
                                <div class="col-span-8">
                                    <mat-form-field class="w-full text-accent-600">
                                        <input id="date"
                                            [attr.min]="question.get('uploadFileType')?.value === 'VIDEO' ? 1: 1"
                                            [attr.max]="question.get('uploadFileType')?.value === 'VIDEO' ? 200 : question.get('uploadFileType')?.value === 'IMAGE' ? 20 : 40"
                                            formControlName="maxFileSize" matInput type="number">
                                    </mat-form-field>
                                </div>
                            </div>
                            <div class="grid grid-cols-12  items-center">
                                <div class="col-span-2 text-primary ">Number of allowed uploads</div>
                                <div class="col-span-8">
                                    <mat-form-field class="w-full text-accent-600">
                                        <input id="date"
                                            [attr.min]="1"
                                            formControlName="maxNoOfUploads" matInput type="number">
                                    </mat-form-field>
                                </div>
                            </div>

                            <!-- assignments.value.length -->
                            <div *ngIf="i > 0" class="grid grid-cols-12  items-center">
                                <div class="col-span-2 text-primary ">Dependent on step numbers</div>
                                <div class="col-span-8">
                                    <mat-form-field class="w-full text-accent-600">
                                        <mat-select formControlName="dependentOnStepNumbers" multiple
                                            placeholder="Select the dependant step numbers">
                                            <mat-option disabled selected>Select</mat-option>
                                            <ng-container *ngFor="let stepNumber of assignments.value; let i = index">
                                                <mat-option *ngIf="i < assignments.value.length - 1" [value]="i">{{i +
                                                    1}}</mat-option>
                                            </ng-container>
                                        </mat-select>
                                    </mat-form-field>
                                </div>
                            </div>

                            <div class="mt-2 pb-3 pr-2 flex flex-row-reverse" *ngIf="i > 0">
                                <button (click)="removeAssignment(i)" type="button" mat-flat-button
                                    color="warn">Remove</button>
                            </div>
                        </div>
                    </ng-template>
                </mat-step>

            </mat-stepper>

        </div>
        <div class="col-span-1">
            <button class="mt-2" (click)="addAssignment()">
                <mat-icon matTooltip="Add New Step"
                    class="ml-4 icon-size-8 text-primary-600 cursor-pointer plusIcon active:text-primary-500"
                    [svgIcon]="'heroicons_solid:plus-circle'">
                </mat-icon>
            </button>
        </div>
    </div>
</form>

<div class="flex flex-row-reverse justify-between pt-3">
    <button matStepperNext mat-stroked-button type="button" (click)="onClickNext()"
        [disabled]="!assignmentsFormGroup.valid" class="bg-primary text-white arrowBtn disabled:bg-primary-100"
        [matTooltip]="tooltipMessage">
        Next
        <mat-icon *ngIf="assignmentsFormGroup.valid" class="ml-2 icon-size-5  text-white arrowIcon"
            [svgIcon]="'heroicons_solid:arrow-sm-right'"></mat-icon>
        <mat-icon *ngIf="!assignmentsFormGroup.valid" class="ml-2 icon-size-5  text-white "
            [svgIcon]="'heroicons_solid:arrow-sm-right'"></mat-icon>
    </button>
    <button matStepperPrevious mat-stroked-button type="button" 
        [disabled]="!assignmentsFormGroup.valid" class="bg-primary text-white arrowBtn disabled:bg-primary-100"
        [matTooltip]="tooltipMessage">

        <mat-icon *ngIf="assignmentsFormGroup.valid" class="mr-2 icon-size-5  text-white arrowIcon"
            [svgIcon]="'heroicons_solid:arrow-sm-left'"></mat-icon>
        <mat-icon *ngIf="!assignmentsFormGroup.valid" class="mr-2 icon-size-5  text-white "
            [svgIcon]="'heroicons_solid:arrow-sm-left'"></mat-icon>
        Previous
    </button>
</div>
