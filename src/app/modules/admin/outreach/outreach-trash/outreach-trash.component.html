<div class="py-6 h-screen w-screen overflow-hidden relative">
  <button (click)="closeDrawer()" class="m-3 absolute top-0 right-0 z-40">
    <mat-icon class="hover:scale-110 transition duration-500 transform" svgIcon="mat_outline:close"></mat-icon>
  </button>

  <button (click)="emptyTrash()" mat-stroked-button color="warn" class="m-3 text-center absolute top-1 right-10 z-40"
    [disabled]="deletedOutreach.length === 0">
    <mat-icon class="text-red-500 cursor-pointer transition duration-500 transform hover:scale-[115%]"
      svgIcon="delete_outline"></mat-icon>
    Empty Trash
  </button>

  <div class="pl-4 pr-22 h-10 flex justify-between">
    <p class="font-bold text-lg text-accent-600">View Deleted Outreach</p>
  </div>

  <div class="w-full">
    <div *ngIf="isLoading" class="flex items-center justify-center py-10">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div *ngIf="!isLoading && deletedOutreach.length === 0" class="flex flex-col items-center justify-center py-20 text-gray-500">
      <mat-icon class="text-6xl mb-4" style="font-size: 64px; width: 64px; height: 64px;">delete_outline</mat-icon>
      <p class="text-lg">Trash is empty</p>
    </div>

    <div *ngIf="!isLoading && deletedOutreach.length > 0" class="grid mt-4">
      <div class="outreach-trash-grid z-10 sticky top-0 grid gap-8 py-4 px-10 md:px-8 shadow text-md font-semibold text-secondary bg-gray-50 dark:bg-black dark:bg-opacity-5">
        <div>QR Code</div>
        <div>Institution</div>
        <div>Date Generated</div>
        <div>Deleted On</div>
        <div class="hidden sm:block">Restore</div>
        <div class="hidden sm:block">Delete</div>
      </div>

      <div class="overflow-y-auto h-[calc(100vh_-_140px)]">
        <ng-container *ngFor="let item of deletedOutreach; trackBy: trackByFn">
          <div class="outreach-trash-grid grid items-center text-secondary gap-8 py-3 px-10 md:px-8 border-b border-gray-400">
            <div class="flex items-center">
              <ng-container *ngIf="item.qrCodeImageUrl; else qrFallback">
                <img [src]="item.qrCodeImageUrl" alt="qr" class="h-10 w-10 object-contain border rounded" />
              </ng-container>
              <ng-template #qrFallback>
                <mat-icon class="text-primary" [svgIcon]="'heroicons_outline:qrcode'"></mat-icon>
              </ng-template>
            </div>

            <div class="font-medium truncate" [matTooltip]="item.institutionName" matTooltipPosition="above">{{item.institutionName || '-'}}</div>
            <div>{{formatDate(item.dateGenerated || item.createdAt)}}</div>
            <div>{{formatDate(item.deletedAt)}}</div>

            <div class="hidden sm:block">
              <mat-icon (click)="restore(item)" class="text-primary icon-size-5 cursor-pointer transition duration-500 transform hover:scale-[115%]"
                matTooltip="Restore">
                <span class="material-icons">restore_from_trash</span>
              </mat-icon>
            </div>

            <div class="hidden sm:block">
              <mat-icon (click)="permanentDelete(item)" class="text-red-500 cursor-pointer transition duration-500 transform hover:scale-[115%]"
                svgIcon="delete_outline" matTooltip="Delete Permanently">
              </mat-icon>
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</div>
