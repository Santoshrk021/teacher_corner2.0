<div class="w-full max-w-[520px]">
  <div class="flex items-center justify-between px-6 pt-6">
    <div>
      <div class="text-xl font-bold text-slate-800">Outreach QR Code</div>
      <div class="text-sm text-slate-500 mt-1">Unique Code: <span class="font-semibold text-slate-700">{{data?.uniqueCode}}</span></div>
    </div>

    <button mat-icon-button (click)="close()" aria-label="Close">
      <mat-icon svgIcon="mat_outline:close"></mat-icon>
    </button>
  </div>

  <div class="px-6 pb-6 pt-4">
    <div class="rounded-2xl border border-slate-200 bg-gradient-to-br from-slate-50 to-white p-4">
      <div class="flex flex-col items-center">
        <div class="w-full flex items-center justify-center">
          <div *ngIf="loading" class="h-[320px] w-[320px] flex items-center justify-center rounded-xl bg-white border border-slate-200">
            <mat-spinner [diameter]="40"></mat-spinner>
          </div>

          <img *ngIf="!loading && dataUrl" [src]="dataUrl" alt="QR" class="h-[320px] w-[320px] rounded-xl bg-white p-3 shadow-sm border border-slate-200" />
        </div>

        <div class="w-full mt-4">
          <div class="text-xs text-slate-500 mb-2">Scan or open this URL:</div>
          <div class="flex items-center justify-between gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2">
            <div class="truncate text-sm text-slate-700" [matTooltip]="url" matTooltipPosition="above">{{url}}</div>
            <button mat-icon-button (click)="copyLink()" matTooltip="Copy">
              <mat-icon svgIcon="heroicons_outline:clipboard"></mat-icon>
            </button>
          </div>

          <div class="flex items-center justify-end gap-2 mt-4">
            <button mat-stroked-button (click)="copyLink()" class="min-w-[120px]">Copy Link</button>
            <button mat-flat-button color="primary" (click)="openLink()" class="min-w-[120px]">Open</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
