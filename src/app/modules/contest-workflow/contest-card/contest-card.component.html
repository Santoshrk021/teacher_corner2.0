<div class="absolute inset-0 flex flex-col min-w-0 overflow-y-auto" cdkScrollable>

    <!-- Main -->
    <div class="flex flex-auto p-6 sm:p-10">

        <div class="grid sm:grid-cols-3 grid-cols-1 gap-8 m-6 sm:mt-5 mt-10 w-full">

            <!-- Courses -->
            <ng-container *ngIf="selectedContest.allSubmissions?.length;">
                <ng-container *ngFor="let course of selectedContest.allSubmissions; trackBy: trackByFn">
                    <div class="h-[280px] flex flex-col shadow rounded-2xl overflow-hidden bg-card">
                        <div class="flex flex-col p-6">
                            <div class="flex items-center justify-between">
                                <!-- Course category -->
                                <ng-container *ngIf="course?.type">
                                    <div class="py-0.5 px-3 rounded-full text-sm font-semibold"
                                        [ngClass]="{'text-blue-800 bg-blue-100 dark:text-blue-50 dark:bg-blue-500': course?.type === 'TACtivity',
                                                        'text-green-800 bg-green-100 dark:text-green-50 dark:bg-green-500': course?.type === 'TACtivity',
                                                        'text-pink-800 bg-pink-100 dark:text-pink-50 dark:bg-pink-500': course?.type === 'cloud',
                                                        'text-amber-800 bg-amber-100 dark:text-amber-50 dark:bg-amber-500': course?.type === 'firebase'}">
                                        {{course?.type}}
                                    </div>
                                </ng-container>
                                <!-- Completed at least once -->
                                <!-- <div class="flex items-center">
                                    <ng-container *ngIf="course?.progress?.completed > 0">
                                        <mat-icon class="icon-size-5 text-green-600"
                                            [svgIcon]="'heroicons_solid:badge-check'"></mat-icon>
                                    </ng-container>
                                </div> -->
                            </div>
                            <!-- Course title & description -->
                            <div class="mt-4 text-lg font-medium">{{course.displayName}}</div>
                            <!-- <div class="mt-0.5 line-clamp-2 text-secondary">{{course.description}}</div> -->
                            <!-- <div class="w-full h-1 my-6 border-t-1"></div> -->

                            <div class="mt-6 flex justify-between items-center">
                                <div class="w-10 h-10">
                                    <img [src]="course?.imagePath |getDownloadURL" loading="lazy"
                                        alt="Learing unit image icon" class="w-10">
                                </div>
                            </div>

                            <!-- Course time -->
                            <!-- <div class="flex items-center leading-5 text-md text-secondary">
                                    <mat-icon class="icon-size-5 text-hint"
                                        [svgIcon]="'heroicons_solid:clock'"></mat-icon>
                                    <div class="ml-1.5">{{course.duration}} minutes</div>
                                </div> -->

                        </div>
                        <!-- Footer -->
                        <div class="flex flex-col w-full mt-auto">
                            <!-- Course progress -->
                            <!-- <div class="relative h-0.5">
                                    <div class="z-10 absolute inset-x-0 h-6 -mt-3"
                                        [matTooltip]="(course.progress.currentStep+1)/ course.totalSteps | percent"
                                        [matTooltipPosition]="'above'" [matTooltipClass]="'-mb-0.5'"></div>
                                    <mat-progress-bar class="h-0.5"
                                        [value]="100 * (course.progress.currentStep+1) / course.totalSteps"></mat-progress-bar>
                                </div> -->

                            <!-- Course launch button -->
                            <div class="px-6 py-4 text-right bg-gray-50 dark:bg-transparent">
                                <!-- <a mat-stroked-button [disabled]="true" matTooltip="Under Progress"> -->
                                <!-- <a mat-stroked-button [routerLink]="[ course?.submissionId]"> -->
                                <a mat-stroked-button (click)="getWorkflow(course.submissionId)">
                                    <span class="inline-flex items-center">
                                        <!-- Started -->
                                        <ng-container>
                                            <span>Configure Workflow</span>
                                        </ng-container>
                                        <mat-icon class="ml-1.5 icon-size-5"
                                            [svgIcon]="'heroicons_solid:arrow-sm-right'"></mat-icon>
                                    </span>
                                </a>
                            </div>
                        </div>
                    </div>
                </ng-container>

            </ng-container>

            <!-- Create new Submission -->
            <div *ngIf="selectedContest.allowedSubmission>selectedContest?.allSubmissions?.length" matRipple
                (click)="addNewSubm()"
                class="h-[280px] w-full hover:bg-hover bg-gray-100 shadow-lg rounded-2xl border-4 border-dashed border-gray-300 flex justify-center items-center scale_on_hover cursor-pointer">
                <mat-icon svgIcon="feather:plus" class="mat-icon-no-color icon-size-12"></mat-icon>
            </div>

            <!-- No courses -->
            <ng-template #noCourses>
                <div
                    class="invisible flex flex-auto flex-col items-center justify-center bg-gray-100 dark:bg-transparent">
                    <mat-icon class="icon-size-24" [svgIcon]="'heroicons_outline:document-search'"></mat-icon>
                    <div class="mt-6 text-2xl font-semibold tracking-tight text-secondary">No courses found!</div>
                </div>
            </ng-template>
        </div>

    </div>

</div>
<!-- <router-outlet></router-outlet> -->
