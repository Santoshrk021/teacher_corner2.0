<div class="h-[57vh]">
    <div class="pt-1 h-full">
        <div class=" h-full overflow-auto bg-primary-50  rounded-xl p-4">
            <!-- quiz info -->
            <div class="grid grid-cols-5 mb-6">
                <div class="col-span-2 text-accent font-semibold">
                    <p class="mb-2  ">Assignment Name</p>
                    <p class="mb-2 ">Creator</p>
                    <p class="mb-2 ">Author</p>

                </div>
                <div class="col-span-3 text-accent font-medium">
                    <p class="mb-2 ">{{basicInfo?.displayName}}</p>
                    <p class="mb-2 ">{{basicInfo?.creator}}</p>
                    <p class="mb-2 ">{{basicInfo?.author}}</p>

                </div>
            </div>
            <!-- preview  qus info -->
            <mat-stepper labelPosition="bottom" linear #stepper class=" bg-transparent" [animationDuration]="1000">
                <mat-step *ngFor="let asgmnt of qusInfo?.assignments">
                    <ng-template matStepLabel ><span class="text-sm">{{asgmnt?.title}}</span></ng-template>
                    <table class="mt-3">
                        <!-- <tr>
                            <th class="w-1/3 pb-4 text-primary text-left ">Due Date</th>
                            <td class="pb-4 text-secondary">{{asgmnt?.dueDate?.seconds*1000 | date}}</td>
                            <td class="pb-4 pl-4 text-secondary ">{{asgmnt?.dueDate| date}}</td>
                        </tr> -->
                        <tr>
                            <th class="w-1/3 pb-4 text-primary text-left">Instructions</th>
                            <td class="pb-4 pl-4 text-secondary"> {{asgmnt?.instructions}}
                            </td>
                        </tr>
                        <tr>
                            <th class="w-1/3  text-primary text-left">Assignment</th>
                            <td class="pl-4">
                               <div class="h-10 w-30 rounded-full bg-primary-500 font-medium flex items-center justify-center text-white">
                                    <span>Upload</span>
                               </div>
                            </td>
                        </tr>
                        <tr>
                            <th></th>
                            <td class="block sm:hidden pt-3">
                                <!-- <button matRipple class="ml-2 mat-stroked-button hover:bg-primary border-primary hover:text-white "
                                                (click)="onClickView()">View</button> -->
                                <a *ngIf="storedFilePath" matRipple [href]="storedFilePath|getDownloadURL"
                                    target="_blank"
                                    class="ml-2 mat-stroked-button hover:bg-primary hover:text-white active:bg-primary-800 scale-90"
                                    title="View">View</a>
                            </td>
                        </tr>
                        <tr>
                            <th></th>
                            <div class="pl-2 mt-2 hidden sm:block" [style.visibility]=" loader ? 'visible' : 'hidden'">
                                <span class="loader ml-12"></span>
                            </div>
                        </tr>
                    </table>
                </mat-step>
            </mat-stepper>

        </div>
    </div>
</div>

<div class="flex justify-between pt-3">
    <button matStepperPrevious mat-stroked-button type="submit"
        class="bg-primary text-white  arrowBtnBack disabled:bg-primary-100">
        <mat-icon class="mr-2 icon-size-5  text-white arrowIconBack"
            [svgIcon]="'heroicons_solid:arrow-sm-left'"></mat-icon>
        Back
    </button>
    <button [disabled]="btnDisable" (click)="onSave(assignmentInfo?.docId)" matStepperNext mat-stroked-button
        type="submit" class=" bg-primary text-white arrowBtn disabled:bg-primary-100">
        {{this.assignmentInfo?.assignments?'Update Quiz':'Save Quiz'}}
        <mat-icon class="ml-2 icon-size-5  text-white arrowIcon"
            [svgIcon]="'heroicons_solid:arrow-sm-right'"></mat-icon>
        <!-- <mat-icon *ngIf="!quizInfoForm.valid" class="ml-2 icon-size-5  text-white "
            [svgIcon]="'heroicons_solid:arrow-sm-right'"></mat-icon> -->
    </button>
</div>
